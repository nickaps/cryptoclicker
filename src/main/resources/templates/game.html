<!DOCTYPE html>
<html lang="en">
<head>
    <title>Game</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/game.css">

    <script th:inline="javascript">

        window.addEventListener("DOMContentLoaded", () => {
            document.getElementById("score").textContent = 0;
        });

        var currentUser = [[${user}]];
        var currentUserName = [[${currentUserName}]];
        var currentUserScore = [[${currentUserScore}]];

    </script>
    <script th:src="@{/scripts/game.js}" defer></script>
</head>

<body>

<h2 class="title-bar">Crypto Clicker</h2>

<div id="scoreboard">Crypto: <span id="score">0</span></div>

<div id="game">
    <button class="crypto" onclick="addScore()">Click Here!</button>
</div>

<div id="rigShop">
    <button class="rig" onclick="buy('mk1')">mk1</button>
    <button class="rig" onclick="buy('mk2')">mk2</button>
</div>

<div class="content">
    <div class="info">
        <p id="testLabel">Start Clicking!</p>
        <a href="#" onclick="exitGame()">Back</a>
    </div>
</div>

</body>
</html>
